<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash - Professional Profile</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-accent: #f1c40f; /* Gold */
            --ribbon-color: #e74c3c; /* Red */
            --text-main: #ffffff;
            --text-muted: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; 
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            position: relative;
        }

        /* --- BACKGROUND ANIMATION --- */
        .bg-animation {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }
        .particle:nth-child(1) { width: 10px; height: 10px; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 20px; height: 20px; left: 25%; animation-delay: 2s; }
        .particle:nth-child(3) { width: 15px; height: 15px; left: 60%; animation-delay: 4s; }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* --- PROFILE CARD --- */
        .profile-card {
            background: rgba(20, 20, 20, 0.8); 
            backdrop-filter: blur(10px); 
            padding: 3rem;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 10; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* --- GIFT BOX DESIGN --- */
        .gift-box-container {
            width: 100px; height: 100px;
            background: var(--primary-accent); 
            border-radius: 12px;
            margin: 0 auto 1.5rem;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .gift-box-container::before {
            content: ''; position: absolute; width: 15px; height: 100%;
            background: var(--ribbon-color); left: 50%; transform: translateX(-50%);
        }
        .gift-box-container::after {
            content: ''; position: absolute; width: 100%; height: 15px;
            background: var(--ribbon-color); top: 50%; transform: translateY(-50%);
        }
        .gift-box-initials { font-size: 2rem; font-weight: bold; color: #000; z-index: 2; }

        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .id-badge { color: var(--primary-accent); font-size: 0.8rem; margin-bottom: 1.5rem; display: block; letter-spacing: 1px; }
        
        .contact-box { 
            margin-bottom: 2rem; background: rgba(255,255,255,0.05); 
            padding: 1rem; border-radius: 10px; 
        }

        /* --- RAZORPAY BUTTON STYLING --- */
        /* This forces the Razorpay button to look like our theme */
        .razorpay-payment-button {
            background-color: var(--primary-accent) !important;
            color: #000 !important;
            border: none !important;
            padding: 14px 24px !important;
            border-radius: 10px !important;
            font-size: 1rem !important;
            font-weight: 700 !important;
            width: 100% !important;
            cursor: pointer !important;
            box-shadow: 0 4px 15px rgba(241, 196, 15, 0.2) !important;
            transition: all 0.3s ease !important;
        }
        .razorpay-payment-button:hover {
            background-color: #ffffff !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="profile-card">
        <div class="gift-box-container">
            <span class="gift-box-initials">Y</span>
        </div>

        <h1>Yash</h1>
        <span class="id-badge">VERIFIED PROFILE</span>

        <div class="contact-box">
            <p style="font-size: 0.9rem; color: var(--text-muted);">Contact via Email:</p>
            <p style="font-weight: 600;">yash.professional@email.com</p>
        </div>

        <form>
            <script src="https://checkout.razorpay.com/v1/payment-button.js" 
                    data-payment_button_id="pl_SWZ1cBPAy7fj28" async> 
            </script> 
        </form>
    </div>

</body>
</html>
